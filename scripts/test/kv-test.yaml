apiVersion: v1
kind: Pod

metadata:
  name: kv-test
  namespace: cwpp-dev
  labels:
    azure.workload.identity/use: "true"

spec:

  serviceAccountName: flask-sa

  containers:

  - name: ubuntu

    image: ubuntu:22.04

    command:
      - sleep
      - infinity

    volumeMounts:

    - name: secrets-store

      mountPath: "/mnt/secrets-store"

      readOnly: true

  volumes:

  - name: secrets-store

    csi:

      driver: secrets-store.csi.k8s.io

      readOnly: true

      volumeAttributes:

        secretProviderClass: "azure-kv"